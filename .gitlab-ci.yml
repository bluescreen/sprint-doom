stages:
  - build
  - deploy

build-sprint-doom:
  tags:
    - he-small
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    IMAGE: $CI_REGISTRY_IMAGE:sprint-doom-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --provenance=false -t $IMAGE .
    - docker push $IMAGE
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_BRANCH
      changes:
        - index.html
        - css/**/*
        - js/**/*
        - assets/**/*
        - Dockerfile
        - deploy/**/*

update-image-tag:
  tags:
    - he-small
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git config user.email "gitlab-ci@denkwerk.com"
    - git config user.name "GitLab CI"
    - |
      sed -i "s/^  tag:.*$/  tag: sprint-doom-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA/" deploy/values.yaml
    - |
      if git diff --quiet; then
        echo "Tag already up to date, nothing to commit."
      else
        git add deploy/values.yaml
        git commit -m "ci: set sprint-doom image tag to sprint-doom-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA [skip ci]"
        git pull --rebase "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" ${CI_COMMIT_BRANCH}
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_BRANCH}
      fi
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_BRANCH
      changes:
        - index.html
        - css/**/*
        - js/**/*
        - assets/**/*
        - Dockerfile
        - deploy/**/*
